<!DOCTYPE html>
<html>
<head>
<title>Report Found Item</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f1117;
color:white;
font-family:Arial;
}

.navbar{
background:#151a23;
border-bottom:1px solid #2a2f3a;
}

.form-card{
background:#1a1f2b;
border:1px solid #2d3442;
border-radius:12px;
padding:25px;
}

textarea,input{
background:#0f1117 !important;
color:white !important;
border:1px solid #2d3442 !important;
}

.btn-submit{
background:#ffc107;
border:none;
color:black;
font-weight:600;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">

<span class="navbar-brand fw-bold">
Report Found Item
</span>

<a href="/dashboard" class="btn btn-outline-light btn-sm">
Back
</a>

</nav>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-7">

<div class="form-card">

<h4 class="mb-4 text-center">
Report Found Item
</h4>

<form method="POST" enctype="multipart/form-data">

<!-- DESCRIPTION -->

<div class="mb-3">
<label class="form-label">
Describe the found item
</label>
<textarea
class="form-control"
name="description"
rows="4"
placeholder="Example: Found black earbuds near library"
required></textarea>
</div>

<!-- LOCATION (IMPORTANT FIX) -->

<div class="mb-3">
<label class="form-label">
Where did you find it?
</label>
<input
type="text"
name="place"
class="form-control"
placeholder="Example: Library, Lab, Parking"
required>
</div>

<!-- DATE -->

<div class="mb-3">
<label class="form-label">
Date Found
</label>
<input
type="date"
name="date_found"
class="form-control"
required>
</div>

<!-- IMAGE -->

<div class="mb-3">
<label class="form-label">
Upload Image (required)
</label>
<input
type="file"
name="image"
class="form-control"
required>
</div>

<div class="text-center">
<button class="btn btn-submit px-4">
Submit Found Item
</button>
</div>

</form>

</div>

</div>
</div>
</div>

</body>
</html>
