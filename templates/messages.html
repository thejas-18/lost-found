<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f1117;
            color:white;
        }

        .navbar{
            background:#151a23 !important;
            border-bottom:1px solid #2a2f3a;
        }

        .table{
            background:#1a1f2b;
            border-radius:12px;
            overflow:hidden;
        }

        .table thead{
            background:#202734;
        }

        .badge{
            font-size:13px;
        }

        .btn-sm{
            border-radius:8px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand fw-bold">Admin Messages</span>
    <a href="/dashboard" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container mt-4">

    <h3 class="mb-4 text-center">Pending Claims</h3>

    <table class="table table-dark table-hover align-middle text-center">

        <thead>
            <tr>
                <th>Match ID</th>
                <th>Item</th>
                <th>Message</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            {% for msg in messages %}
            <tr>

                <td>{{ msg.match_id }}</td>

                <td>{{ msg.title }}</td>

                <td style="max-width:250px;">
                    {{ msg.message }}
                </td>

                <td>
                    {% if msg.status == 'pending' %}
                        <span class="badge bg-warning text-dark">
                            Pending
                        </span>
                    {% else %}
                        <span class="badge bg-success">
                            Approved
                        </span>
                    {% endif %}
                </td>

                <td>
                    <a href="/approve-message/{{ msg.match_id }}"
                       class="btn btn-success btn-sm">
                        Approve
                    </a>
                </td>

            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
