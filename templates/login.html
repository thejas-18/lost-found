<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f1117;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
background:#1a1f2b;
border:1px solid #2d3442;
padding:35px;
border-radius:15px;
width:350px;
}

.title{
text-align:center;
font-weight:700;
margin-bottom:20px;
}

.form-control{
background:#0f1117;
border:1px solid #2d3442;
color:white;
}

.form-control:focus{
background:#0f1117;
color:white;
border-color:#6ea8ff;
box-shadow:none;
}

.btn-login{
width:100%;
border-radius:10px;
font-weight:600;
}

.portal-title{
position:absolute;
top:40px;
font-size:28px;
font-weight:700;
text-align:center;
}

</style>

</head>

<body>

<div class="portal-title">
🔎 Lost & Found Portal
</div>

<div class="login-box">

<h4 class="title">Student Login</h4>

<form method="POST" action="/login">

<div class="mb-3">

<label class="form-label">PRN</label>

<input 
type="text"
name="prn"
class="form-control"
required
>

</div>


<div class="mb-3">

<label class="form-label">Password</label>

<input 
type="password"
name="password"
class="form-control"
required
>

</div>


<button class="btn btn-primary btn-login">
Login
</button>

</form>

</div>

</body>
</html>
