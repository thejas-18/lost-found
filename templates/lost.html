<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Report Lost Item</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0f1117;
color:white;
font-family:Arial;
}
.navbar{
background:#151a23;
border-bottom:1px solid #2a2f3a;
}
.form-card{
background:#1a1f2b;
border:1px solid #2d3442;
border-radius:12px;
padding:25px;
}
textarea,input{
background:#0f1117 !important;
color:white !important;
border:1px solid #2d3442 !important;
}
.btn-submit{
background:#ffc107;
border:none;
color:black;
font-weight:600;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
<span class="navbar-brand fw-bold">Report Lost Item</span>
<a href="/dashboard" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-7">

<div class="form-card">

<h4 class="mb-4 text-center">Report Lost Item</h4>

<form method="POST" enctype="multipart/form-data">

<!-- DESCRIPTION -->
<div class="mb-3">
<label>Describe the lost item</label>
<textarea
class="form-control"
name="description"
rows="4"
placeholder="Example: I lost my black earbuds near the library"
required></textarea>
</div>

<!-- LOCATION -->
<div class="mb-3">
<label>Where did you lose it?</label>
<input
type="text"
name="place"
class="form-control"
placeholder="Example: Library, Lab, Canteen"
required>
</div>

<!-- 🔥 DATE (ADDED) -->
<div class="mb-3">
<label>When did you lose it?</label>
<input
type="date"
name="date_lost"
class="form-control"
required>
</div>

<!-- IMAGE -->
<div class="mb-3">
<label>Upload Image (optional)</label>
<input type="file" name="image" class="form-control">
</div>

<div class="text-center">
<button class="btn btn-submit px-4">
Submit Lost Item
</button>
</div>

</form>

</div>
</div>
</div>
</div>

</body>
</html>
